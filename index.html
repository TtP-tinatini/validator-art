<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>OUT OF ORDER</title>

<style>
  body {
    margin: 0;
    overflow: hidden;
    font-family: Arial, sans-serif;
  }

  .background {
    position: fixed;
    width: 100%;
    height: 100%;
    background: url('background.jpg') no-repeat center center;
    background-size: cover;
  }

  .time {
    position: absolute;
    top: 20px;
    right: 20px;
    color: white;
    font-size: 32px;
    font-weight: bold;
  }

  .text {
    position: absolute;
    bottom: 60px;
    width: 100%;
    text-align: center;
    color: white;
    font-size: 40px;
    letter-spacing: 3px;
  }
</style>
</head>

<body>

<div class="background"></div>
<div class="time" id="clock"></div>
<div class="text">OUT OF ORDER</div>

<script>
function updateClock() {
  const now = new Date();
  const time = now.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
  document.getElementById('clock').innerHTML = time;
}

setInterval(updateClock, 1000);
updateClock();
</script>

</body>
</html>
